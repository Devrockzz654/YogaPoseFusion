services:
  - type: web
    name: yogaposefusion-api
    runtime: python
    rootDir: backend
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn inference:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
